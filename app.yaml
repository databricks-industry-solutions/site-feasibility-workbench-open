command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  # ── Required ───────────────────────────────────────────────────────────────
  - name: "DATABRICKS_WAREHOUSE_ID"
    value: ""                          # Auto-filled by setup.sh, or set manually

  - name: "UC_CATALOG"
    value: ""                          # Unity Catalog used in notebooks/00_seed_data.py

  # ── Optional ───────────────────────────────────────────────────────────────
  - name: "GENIE_SPACE_ID"
    value: ""                          # Auto-filled by setup.sh; or run notebooks/01_create_genie_space.py

  - name: "RWE_CLAIMS_TABLE"
    value: ""                          # Defaults to <UC_CATALOG>.dbx_marketplace_rwe_synthetic.claims_sample_synthetic
  # ──────────────────────────────────────────────────────────────────────────

# ── Optional: remove this block if you do not have a Lakebase instance ──────
